multinode: false

# Disable automatic PV/PVC creation - we're using external vllm-shared-storage
ecCache:
  create: false

modelArtifacts:
  uri: "hf://Qwen/Qwen3-VL-2B-Instruct"
  name: "Qwen/Qwen3-VL-2B-Instruct"
  size: 80Gi
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "e-dp-disaggregation"
    llm-d.ai/accelerator-variant: "gpu"
    llm-d.ai/accelerator-vendor: "nvidia"
    llm-d.ai/model: "Qwen3Qwen3-VL-2B-Instruct"

routing:
  servicePort: 8000
  proxy:
    enabled: true  # enables sidecar for prefillDecode pod
    targetPort: 8200  # vLLM port for prefillDecode pod
    image: ghcr.io/revit13/llm-d-routing-sidecar:dev
    imagePullPolicy: Always
    secure: false
    zapEncoder: json
    zapLogLevel: debug

accelerator:  # controls specialized hardware Type
  type: nvidia

# Encoder pod configuration (using 'encode' section)
# Chart natively supports encode role
encode:
  create: true
  servedModelName: ""
  parallelism:
    tensor: 1
    data: 1
  replicas: 1
  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seLinuxOptions:
      type: spc_t
  monitoring:
    podmonitor:
      enabled: true
      portName: "vllm"
      path: "/metrics"
      interval: "30s"
  initContainers:
    - name: fix-permissions
      image: busybox:latest
      # Changes ownership/permissions so the random OpenShift UID can write
      command: ["sh", "-c", "chmod -R 2775 /shared-ec-cache && chown -R 1000:1000 /shared-ec-cache"]
      securityContext:
            runAsUser: 0
            privileged: true  # This is the magic key for hostPath volumes
      volumeMounts:
        - name: ec-cache
          mountPath: /shared-ec-cache
  containers:
    - name: "vllm"
      image: vllm/vllm-openai:v0.16.0
      imagePullPolicy: Always
      modelCommand: imageDefault
      securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      args:
        - '--disable-access-log-for-endpoints'
        - '/health,/metrics,/v1/models'
        - '--enforce-eager'
        - '--mm-encoder-only'
        - '--no-enable-prefix-caching'
        - '--ec-transfer-config'
        - '{"ec_connector": "ECExampleConnector", "ec_role": "ec_producer", "ec_connector_extra_config": {"shared_storage_path": "/shared-ec-cache"}}'
      ports:
        - containerPort: 8000
          name: vllm
          protocol: TCP
      env:
        - name: PORT
          value: "8000"
        - name: VLLM_USE_V1
          value: "0"
        - name: HUGGINGFACE_HUB_CACHE
          value: "/data"
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: llm-d-hf-token
              key: HF_TOKEN
        - name: TRITON_CACHE_DIR
          value: "/.triton-cache"
      resources:
        limits:
          cpu: '32'
          memory: 100Gi
        requests:
          cpu: '32'
          memory: 100Gi
      mountModelVolume: true
      volumeMounts:
        - name: hf-cache
          mountPath: /data
        - name: ec-cache
          mountPath: /shared-ec-cache
        - name: metrics-volume
          mountPath: /.config
        - name: shm
          mountPath: /dev/shm
        - name: torch-compile-cache
          mountPath: /.cache
        - name: triton-cache
          mountPath: /.triton-cache
      startupProbe:
        httpGet:
          path: /v1/models
          port: vllm
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 60
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
  volumes:
    - name: hf-cache
      emptyDir:
        sizeLimit: 100Gi
    - name: ec-cache
      persistentVolumeClaim:
        claimName: vllm-shared-storage
    - name: metrics-volume
      emptyDir: {}
    - name: torch-compile-cache
      emptyDir: {}
    - name: triton-cache
      emptyDir: {}
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 20Gi

# Decode-Prefill pod configuration (using 'prefillDecode' section)
# Chart natively supports prefillDecode role
prefillDecode:
  create: true
  servedModelName: ""
  parallelism:
    tensor: 1
    data: 1
  replicas: 1
  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seLinuxOptions:
      type: spc_t
  monitoring:
    podmonitor:
      enabled: true
      portName: "vllm"
      path: "/metrics"
      interval: "30s"
  initContainers:
    - name: fix-permissions
      image: busybox:latest
      # Changes ownership/permissions so the random OpenShift UID can write
      command: ["sh", "-c", "chmod -R 2775 /shared-ec-cache && chown -R 1000:1000 /shared-ec-cache"]
      securityContext:
            runAsUser: 0
            privileged: true  # This is the magic key for hostPath volumes
