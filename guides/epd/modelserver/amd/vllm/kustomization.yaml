apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../_recipes

namePrefix: epd-rocm-vllm-

images:
  - name: REPLACE_MODEL_SERVER_IMAGE
    newName: ghcr.io/llm-d/llm-d-rocm
    newTag: v0.7.0

labels:
  - pairs:
      llm-d.ai/guide: epd
      llm-d.ai/model: Qwen3-VL-2B-Instruct
      llm-d.ai/accelerator-variant: gpu
      llm-d.ai/accelerator-vendor: amd
    includeSelectors: true
    includeTemplates: true
    fields:
      - version: v1
        kind: ServiceAccount
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/selector/matchLabels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/template/metadata/labels
        create: true
      - group: monitoring.coreos.com
        version: v1
        kind: PodMonitor
        path: metadata/labels
        create: true
      - group: monitoring.coreos.com
        version: v1
        kind: PodMonitor
        path: spec/selector/matchLabels
        create: true

patches:
  - path: patch-vllm.yaml
    target:
      kind: Deployment
      name: (encode|prefill|decode)
