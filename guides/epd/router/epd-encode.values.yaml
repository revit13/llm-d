## EPD guide overrides for the encode EPP / InferencePool.
## Layer on top of: recipes/router/base.values.yaml

httpRoute:
  headerMatches:
    EPP-Phase: encode

router:
  extraServicePorts:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8081

  epp:
    pluginsConfigFile: "epd-plugins.yaml"
    pluginsCustomConfig:
      epd-plugins.yaml: |
        apiVersion: llm-d.ai/v1alpha1
        kind: EndpointPickerConfig
        plugins:
        - type: queue-scorer
        - type: kv-cache-utilization-scorer
        - type: prefix-cache-scorer
        schedulingProfiles:
        - name: default
          plugins:
          - pluginRef: queue-scorer
            weight: 2
          - pluginRef: kv-cache-utilization-scorer
            weight: 2
          - pluginRef: prefix-cache-scorer
            weight: 3

  modelServers:
    matchLabels:
      llm-d.ai/guide: "epd"
      llm-d.ai/role: "encode"
