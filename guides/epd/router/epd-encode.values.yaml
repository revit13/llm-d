## EPD guide overrides for the encode EPP / InferencePool.
## Layer on top of: recipes/router/base.values.yaml

httpRoute:
  headerMatches:
    EPP-Phase: encode

router:
  extraServicePorts:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8081

  epp:
    image:
      registry: ghcr.io/revit13
      repository: llm-d-router-endpoint-picker
      tag: ec
    pluginsConfigFile: "epd-plugins.yaml"
    pluginsCustomConfig:
      epd-plugins.yaml: |
        apiVersion: llm-d.ai/v1alpha1
        kind: EndpointPickerConfig
        plugins:
        - type: queue-scorer
        schedulingProfiles:
        - name: default
          plugins:
          - pluginRef: queue-scorer

  modelServers:
    matchLabels:
      llm-d.ai/guide: "epd"
      llm-d.ai/role: "encode"
