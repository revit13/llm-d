apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../../../recipes/modelserver/base/single-host/default

namePrefix: mm-baseline-nvidia-gpu-vllm-

images:
  - name: vllm/vllm-openai
    newName: ghcr.io/revit13/vllm-openai
    newTag: 61e53561a

components:
  - ../../../../../../recipes/modelserver/components/images/gpu-vllm

labels:
  - pairs:
      llm-d.ai/model: Qwen3-VL-32B-Instruct
      llm-d.ai/guide: multimodal-optimized-baseline
      llm-d.ai/accelerator-variant: gpu
      llm-d.ai/accelerator-vendor: nvidia
    includeSelectors: true
    includeTemplates: true
patches:
  - path: patch-vllm.yaml
