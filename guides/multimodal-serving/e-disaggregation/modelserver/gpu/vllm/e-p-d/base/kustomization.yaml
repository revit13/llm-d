apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../../../../recipes/modelserver/base/single-host/pd/vllm
  - ../../common

namePrefix: e-p-d-disaggregation-nvidia-gpu-vllm-

components:
  - ../../../../../../../recipes/modelserver/components/images/routing-sidecar

# TODO(#1891): Remove override once upstream vLLM includes encode-disaggregation support.
images:
  # The model server image must be a vLLM build that supports the
  # ECCPUConnector (NIXL) connector used for encode/prefill/decode
  # disaggregation (see --ec-transfer-config in patch-prefill.yaml,
  # and common/encode-deployment.yaml). The upstream
  # vllm/vllm-openai release does not yet include it, so we pin a proprietary build.
  # TODO(https://github.com/llm-d/llm-d/issues/1905): switch back to the shared
  # gpu-vllm component once a released vLLM image bundles the ECCPUConnector.
  - name: REPLACE_MODEL_SERVER_IMAGE
    newName: ghcr.io/revit13/vllm-openai
    newTag: 61e53561a

labels:
  - pairs:
      llm-d.ai/model: Qwen3-VL-32B-Instruct
      llm-d.ai/guide: e-disaggregation
      llm-d.ai/accelerator-variant: gpu
      llm-d.ai/accelerator-vendor: nvidia
      llm-d.ai/engine-type: vllm
    includeSelectors: true
    includeTemplates: true
patches:
  - path: patch-prefill.yaml
  - path: patch-decode.yaml
