apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../../../../recipes/modelserver/base/single-host/pd/vllm
  - encode-deployment.yaml

namePrefix: e-p-d-disaggregation-nvidia-gpu-vllm-

images:
  - name: REPLACE_MODEL_SERVER_IMAGE
    newName: ghcr.io/revit13/vllm-openai
    newTag: 14d40dc7d

labels:
  - pairs:
      llm-d.ai/model: Qwen3-VL-32B-Instruct
      llm-d.ai/guide: e-disaggregation
      llm-d.ai/accelerator-variant: gpu
      llm-d.ai/accelerator-vendor: nvidia
      inference.networking.k8s.io/engine-type: vllm
    includeSelectors: true
    includeTemplates: true
    fields:
      - version: v1
        kind: ServiceAccount
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/selector/matchLabels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/template/metadata/labels
        create: true

patches:
  - path: patch-encode.yaml
  - path: patch-prefill.yaml
  - path: patch-decode.yaml
  - target:
      kind: Deployment
      name: decode
    patch: |
      - op: replace
        path: /spec/template/spec/initContainers/0/image
        value: ghcr.io/revit13/llm-d-router-disagg-sidecar:dev-451239f8c7c6498ae1f9723d5f1ee8058098de93
