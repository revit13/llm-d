apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: llm-d-autoscaler
resources:
  - ../../base
patches:
  - path: configmap-patch.yaml
    target:
      kind: ConfigMap
      name: workload-variant-autoscaler-wva-variantautoscaling-config
  - path: servicemonitor-label-patch.yaml
    target:
      kind: ServiceMonitor
      name: workload-variant-autoscaler-controller-manager-metrics-monitor
