# Strategic merge patch — injects the Squid SSL-bump CA into the llm-d-coordinator
# "coordinator" container so it trusts the proxy's intercepted TLS certs.
#
# The coordinator already carries HTTP_PROXY/HTTPS_PROXY/NO_PROXY, so this patch
# only adds CA trust. Strategic merge keys on name, so existing env/volumes/mounts
# are preserved.
#
# Apply:
#   kubectl patch deployment llm-d-coordinator -n dpikus-epd8 \
#     --type=strategic --patch-file patch-coordinator-ca.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-d-coordinator
spec:
  template:
    spec:
      initContainers:
      - name: install-ca-cert
        image: alpine:3.21
        command:
        - /bin/sh
        - -c
        - |
          apk add --no-cache ca-certificates
          cp -L /etc/ssl/certs/ca-certificates.crt /shared-certs/ca-certificates.crt
          cat /squid-ca/squid-ca-cert.pem >> /shared-certs/ca-certificates.crt
        volumeMounts:
        - name: squid-ca-cert
          mountPath: /squid-ca
          readOnly: true
        - name: shared-certs
          mountPath: /shared-certs
      containers:
      - name: coordinator
        env:
        - name: SSL_CERT_DIR
          value: "/etc/ssl/certs"
        - name: SSL_CERT_FILE
          value: "/etc/ssl/certs/ca-certificates.crt"
        - name: REQUESTS_CA_BUNDLE
          value: "/etc/ssl/certs/ca-certificates.crt"
        - name: CURL_CA_BUNDLE
          value: "/etc/ssl/certs/ca-certificates.crt"
        volumeMounts:
        - name: shared-certs
          mountPath: /etc/ssl/certs
          readOnly: true
      volumes:
      - name: squid-ca-cert
        secret:
          secretName: squid-ca-public-cert
      - name: shared-certs
        emptyDir: {}
